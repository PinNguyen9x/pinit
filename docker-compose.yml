services:
  web:
    image: ${IMAGE:-ghcr.io/pinnguyen9x/learn-nextjs:latest}
    container_name: ${CONTAINER:-learn-nextjs}
    restart: unless-stopped
    ports:
      # Prod: 3000, Staging: 3001 (map ra host); trong container luôn 3000
      - "${HOST_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      # Gọi backend qua tên container trên webnet (prod: json-server-blog, staging: json-server-blog-staging)
      - API_URL=${API_TARGET:-http://json-server-blog:4000}
      # Next standalone bind vào HOSTNAME; Docker đặt = container ID -> ép 0.0.0.0
      - HOSTNAME=0.0.0.0
    networks:
      - webnet
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 5s
      retries: 3

# Network dùng chung prod + staging + backend (tạo sẵn: docker network create webnet)
networks:
  webnet:
    external: true
